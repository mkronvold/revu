name: refresh-images

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: revu
          POSTGRES_USER: revu
          POSTGRES_PASSWORD: revu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U revu -d revu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://revu:revu@127.0.0.1:5432/revu
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: bash ./scripts/db-migrate-url.sh

      - name: Validate workspace
        run: npm run validate

  build-and-publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: revu-api
            dockerfile: apps/api/Dockerfile
            build_args: ""
          - image_name: revu-web
            dockerfile: apps/web/Dockerfile
            build_args: |-
              VITE_API_BASE_URL=/api/v1
              VITE_COMPANY_NAME=Your Company
              VITE_ENABLE_QUESTION_SET_STATUS=false
              APP_REVISION=${{ github.sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute refresh tag
        id: refresh_tag
        run: echo "value=refresh-$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.refresh_tag.outputs.value }}

      - name: Build and publish refreshed image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_args }}
          pull: true
          no-cache: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
