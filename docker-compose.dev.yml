services:
  db:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @revu/api"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-revu}:${POSTGRES_PASSWORD:-revu}@db:5432/${POSTGRES_DB:-revu}
      VITE_ENABLE_QUESTION_SET_STATUS: ${VITE_ENABLE_QUESTION_SET_STATUS:-false}
    ports:
      - "127.0.0.1:${API_PORT:-4000}:4000"
    volumes:
      - .:/workspace

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @revu/web"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_COMPANY_NAME: ${VITE_COMPANY_NAME:-Your Company}
      VITE_AUTO_REFRESH_INTERVAL_MS: ${VITE_AUTO_REFRESH_INTERVAL_MS:-60000}
      VITE_ENABLE_QUESTION_SET_STATUS: ${VITE_ENABLE_QUESTION_SET_STATUS:-false}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://api:4000}
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000').then((response) => { process.exit(response.ok ? 0 : 1); }).catch(() => { process.exit(1); });"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - .:/workspace
