services:
  db:
    container_name: revu-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revu}
      POSTGRES_USER: ${POSTGRES_USER:-revu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revu}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-revu} -d ${POSTGRES_DB:-revu}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      default:
        aliases:
          - revu-postgres

  api:
    container_name: revu-api
    image: ${REVU_API_IMAGE:-ghcr.io/mkronvold/revu-api}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-revu}:${POSTGRES_PASSWORD:-revu}@db:5432/${POSTGRES_DB:-revu}
      BACKUP_ARCHIVE_DIR: ${BACKUP_ARCHIVE_DIR:-/var/lib/revu/backups/archive}
      BACKUP_HANDOFF_DIR: ${BACKUP_HANDOFF_DIR:-/var/lib/revu/backups/handoff}
      BACKUP_CONFIG_DIR: ${BACKUP_CONFIG_DIR:-/var/lib/revu/backups/config}
      BACKUP_STATUS_PATH: ${BACKUP_STATUS_PATH:-/var/lib/revu/backups/config/status.json}
      BACKUP_AUTOMATIC_ENABLED: ${BACKUP_AUTOMATIC_ENABLED:-false}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-daily}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      VITE_ENABLE_QUESTION_SET_STATUS: ${VITE_ENABLE_QUESTION_SET_STATUS:-false}
    expose:
      - "4000"
    volumes:
      - backup-archive:${BACKUP_ARCHIVE_DIR:-/var/lib/revu/backups/archive}
      - backup-handoff:${BACKUP_HANDOFF_DIR:-/var/lib/revu/backups/handoff}
      - backup-config:${BACKUP_CONFIG_DIR:-/var/lib/revu/backups/config}
      - ./scripts:/opt/revu/scripts:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4000/health').then((response) => { process.exit(response.ok ? 0 : 1); }).catch(() => { process.exit(1); });"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
    networks:
      default:
        aliases:
          - revu-api

  backup:
    container_name: revu-backup
    image: node:22-bookworm-slim
    restart: unless-stopped
    working_dir: /opt/revu
    entrypoint:
      - /bin/sh
      - /opt/revu/scripts/backup-entrypoint.sh
    command:
      - scheduler
    environment:
      BACKUP_ARCHIVE_DIR: ${BACKUP_ARCHIVE_DIR:-/var/lib/revu/backups/archive}
      BACKUP_HANDOFF_DIR: ${BACKUP_HANDOFF_DIR:-/var/lib/revu/backups/handoff}
      BACKUP_CONFIG_DIR: ${BACKUP_CONFIG_DIR:-/var/lib/revu/backups/config}
      BACKUP_STATUS_PATH: ${BACKUP_STATUS_PATH:-/var/lib/revu/backups/config/status.json}
      BACKUP_DOWNLOAD_URL: ${BACKUP_DOWNLOAD_URL:-http://api:4000/api/v1/admin/backups/export}
      BACKUP_RESTORE_URL: ${BACKUP_RESTORE_URL:-http://api:4000/api/v1/admin/backups/restore}
      BACKUP_FILE_PREFIX: ${BACKUP_FILE_PREFIX:-revu-backup}
      BACKUP_FILE_EXTENSION: ${BACKUP_FILE_EXTENSION:-json}
      BACKUP_AUTOMATIC_ENABLED: ${BACKUP_AUTOMATIC_ENABLED:-false}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-daily}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-14}
      BACKUP_RESTORE_MODE: ${BACKUP_RESTORE_MODE:-replace}
      BACKUP_RESTORE_TARGET: ${BACKUP_RESTORE_TARGET:-full}
      BACKUP_BEARER_TOKEN: ${BACKUP_BEARER_TOKEN:-}
      BACKUP_HEADER_NAME: ${BACKUP_HEADER_NAME:-}
      BACKUP_HEADER_VALUE: ${BACKUP_HEADER_VALUE:-}
    volumes:
      - ./scripts:/opt/revu/scripts:ro
      - backup-archive:${BACKUP_ARCHIVE_DIR:-/var/lib/revu/backups/archive}
      - backup-handoff:${BACKUP_HANDOFF_DIR:-/var/lib/revu/backups/handoff}
      - backup-config:${BACKUP_CONFIG_DIR:-/var/lib/revu/backups/config}
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
        aliases:
          - revu-backup

  web:
    container_name: revu-web
    image: ${REVU_WEB_IMAGE:-ghcr.io/mkronvold/revu-web}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      VITE_COMPANY_NAME: ${VITE_COMPANY_NAME:-Your Company}
      VITE_AUTO_REFRESH_INTERVAL_MS: ${VITE_AUTO_REFRESH_INTERVAL_MS:-60000}
      VITE_ENABLE_QUESTION_SET_STATUS: ${VITE_ENABLE_QUESTION_SET_STATUS:-false}
    # Deployment intentionally keeps web internal to Docker networks.
    # Decision point: keep it this way behind a reverse proxy on proxy-net, or
    # publish a host port from a separate override only when direct access is required.
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:3000/healthz || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    networks:
      default:
        aliases:
          - revu-web
      proxy-net:
        aliases:
          - revu-web

volumes:
  postgres-data:
  backup-archive:
  backup-handoff:
  backup-config:

networks:
  proxy-net:
    external: ${PROXY_NET_EXTERNAL:-true}
    name: ${PROXY_NET_NAME:-nginxproxy_proxy-net}
