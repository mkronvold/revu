services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revu}
      POSTGRES_USER: ${POSTGRES_USER:-revu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-revu} -d ${POSTGRES_DB:-revu}
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${REVU_API_IMAGE:-ghcr.io/mkronvold/revu-api}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-revu}:${POSTGRES_PASSWORD:-revu}@db:5432/${POSTGRES_DB:-revu}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${REVU_WEB_IMAGE:-ghcr.io/mkronvold/revu-web}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
