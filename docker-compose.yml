services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revu}
      POSTGRES_USER: ${POSTGRES_USER:-revu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-revu} -d ${POSTGRES_DB:-revu}
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @revu/api"
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-revu}:${POSTGRES_PASSWORD:-revu}@db:5432/${POSTGRES_DB:-revu}
    ports:
      - "${API_PORT:-4000}:${API_PORT:-4000}"
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @revu/web"
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
