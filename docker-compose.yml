services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-revu}
      POSTGRES_USER: ${POSTGRES_USER:-revu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-revu}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-revu} -d ${POSTGRES_DB:-revu}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    image: ${REVU_API_IMAGE:-ghcr.io/mkronvold/revu-api}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-revu}:${POSTGRES_PASSWORD:-revu}@db:5432/${POSTGRES_DB:-revu}
    expose:
      - "4000"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4000/health').then((response) => { process.exit(response.ok ? 0 : 1); }).catch(() => { process.exit(1); });"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ${REVU_WEB_IMAGE:-ghcr.io/mkronvold/revu-web}:${REVU_IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:3000/healthz || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
